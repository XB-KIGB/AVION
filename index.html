<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor STL Simple</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #topbar {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 10px;
    }

    button, input[type="file"] {
      background: #222;
      color: white;
      border: 1px solid #555;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #status {
      min-width: 220px;
      font-size: 14px;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <input type="file" id="fileInput" accept=".stl" />
    <button id="resetBtn">Reset vista</button>
    <button id="wireBtn">Wireframe OFF</button>
    <button id="spinBtn">Auto giro ON</button>
    <span id="status">Carga un archivo STL</span>
  </div>

  <canvas id="viewer"></canvas>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { STLLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/STLLoader.js';

    const canvas = document.getElementById('viewer');
    const fileInput = document.getElementById('fileInput');
    const resetBtn = document.getElementById('resetBtn');
    const wireBtn = document.getElementById('wireBtn');
    const spinBtn = document.getElementById('spinBtn');
    const status = document.getElementById('status');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      10000
    );
    camera.position.set(0, 0, 120);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.8);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(50, 50, 100);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(200, 20, 0x666666, 0x333333);
    grid.rotation.x = 0;
    scene.add(grid);

    const axes = new THREE.AxesHelper(50);
    scene.add(axes);

    const loader = new STLLoader();

    let mesh = null;
    let autoSpin = true;
    let wireframe = false;

    function setStatus(text) {
      status.textContent = text;
    }

    function clearMesh() {
      if (!mesh) return;
      scene.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();
      mesh = null;
    }

    function fitCameraToMesh(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());

      const maxDim = Math.max(size.x, size.y, size.z);
      const distance = maxDim * 2.2 || 100;

      camera.position.set(center.x, center.y, center.z + distance);
      camera.near = Math.max(0.1, distance / 1000);
      camera.far = Math.max(1000, distance * 10);
      camera.updateProjectionMatrix();

      controls.target.copy(center);
      controls.update();
    }

    function loadSTLFromBuffer(arrayBuffer, fileName = 'modelo.stl') {
      try {
        const geometry = loader.parse(arrayBuffer);

        if (!geometry || !geometry.attributes.position || geometry.attributes.position.count === 0) {
          throw new Error('El STL no contiene geometría válida.');
        }

        geometry.computeVertexNormals();
        geometry.center();

        const material = new THREE.MeshStandardMaterial({
          color: 0xbfbfbf,
          wireframe: wireframe
        });

        clearMesh();

        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        fitCameraToMesh(mesh);
        setStatus(`STL cargado: ${fileName}`);
      } catch (error) {
        console.error(error);
        setStatus('Error al cargar el STL');
      }
    }

    fileInput.addEventListener('change', async (event) => {
      const file = event.target.files[0];
      if (!file) return;

      if (!file.name.toLowerCase().endsWith('.stl')) {
        setStatus('Selecciona un archivo .stl');
        return;
      }

      try {
        setStatus('Cargando STL...');
        const buffer = await file.arrayBuffer();
        loadSTLFromBuffer(buffer, file.name);
      } catch (error) {
        console.error(error);
        setStatus('No se pudo leer el archivo');
      }
    });

    resetBtn.addEventListener('click', () => {
      if (!mesh) return;
      fitCameraToMesh(mesh);
      setStatus('Vista reiniciada');
    });

    wireBtn.addEventListener('click', () => {
      wireframe = !wireframe;
      wireBtn.textContent = wireframe ? 'Wireframe ON' : 'Wireframe OFF';
      if (mesh) {
        mesh.material.wireframe = wireframe;
        mesh.material.needsUpdate = true;
      }
    });

    spinBtn.addEventListener('click', () => {
      autoSpin = !autoSpin;
      spinBtn.textContent = autoSpin ? 'Auto giro ON' : 'Auto giro OFF';
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      if (mesh && autoSpin) {
        mesh.rotation.y += 0.01;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
